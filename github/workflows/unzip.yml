name: Extract Template and Deploy

# This tells GitHub to run the script automatically right NOW when you hit save
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  extract_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Template Files
        run: |
          mkdir temp_extract
          unzip Tailstore-main.zip -d temp_extract
          cp -r temp_extract/Tailstore-main/* . || cp -r temp_extract/* .
          rm -rf temp_extract

      - name: Commit and Push Extracted Folders
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Automated unzip: Extracted all subfolders and assets" || exit 0
          git push origin main

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
